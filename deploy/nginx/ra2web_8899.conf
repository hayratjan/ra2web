# ra2web 8899 端口 Nginx 反代配置
# 大文件(fully-music.exe 等)由 Nginx 直接 sendfile 提供，支持断点续传(Range)
# Daphne 仅监听本机 8898，处理 WebSocket 与 API

server {
    listen 8899;
    server_name _;

    client_max_body_size 4m;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    # 大文件下载超时(秒)
    send_timeout 3600s;

    # 游戏资源包(~242MB)，必须由 Nginx 直出以支持 Range 续传
    location = /fully-music.exe {
        alias /opt/ra2web/fully-music.exe;
        default_type application/octet-stream;
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=86400";
    }

    # MOD 资源目录
    location /mod/ {
        alias /opt/ra2web/mod/;
        default_type application/octet-stream;
        add_header Accept-Ranges bytes;
        add_header Access-Control-Allow-Origin *;
    }

    # 游戏资源 CDN 反代(经本机访问,不直连外网)
    location /gameres/ {
        proxy_pass https://wyhjres2.bun.sh.cn/;
        proxy_ssl_server_name on;
        proxy_set_header Host wyhjres2.bun.sh.cn;
        proxy_set_header X-Real-IP $remote_addr;
        add_header Access-Control-Allow-Origin *;
    }

    # 地图资源反代
    location /maps/ {
        proxy_pass https://gameres.chronodivide.com/map/;
        proxy_ssl_server_name on;
        proxy_set_header Host gameres.chronodivide.com;
        add_header Access-Control-Allow-Origin *;
    }

    # detect-gpu 基准数据反代
    location /vendor/detect-gpu/ {
        proxy_pass https://unpkg.com/detect-gpu@5.0.42/dist/;
        proxy_ssl_server_name on;
        proxy_set_header Host unpkg.com;
        add_header Access-Control-Allow-Origin *;
    }

    # 常见静态目录(减轻 Daphne 压力)
    location ~* ^/(dist|lib|res|favicon\.ico|style\.css|index\.html|config\.ini|servers\.ini|breaking-news\.html) {
        root /opt/ra2web;
        add_header Access-Control-Allow-Origin *;
        try_files $uri =404;
    }

    # 其余请求转发至 Daphne(大厅/中继/天梯/战绩)
    location / {
        proxy_pass http://127.0.0.1:8898;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    access_log /www/wwwlogs/ra2web_8899.log;
    error_log /www/wwwlogs/ra2web_8899.error.log;
}
